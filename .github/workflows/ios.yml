name: Flutter iOS CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios && pod install

      - name: Run tests
        run: flutter test

      - name: Build iOS app (no code signing)
        run: |
          flutter build ios --release --no-codesign

      - name: Archive and export IPA (optional with credentials)
        if: false
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -destination 'generic/platform=iOS' archive -archivePath $PWD/build/Runner.xcarchive
          xcodebuild -exportArchive -archivePath $PWD/build/Runner.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath $PWD/build/ios/ipa
